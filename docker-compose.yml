services:
  postgres:
    image: postgres:16-alpine
    container_name: orderservice-postgres
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USERNAME}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - orderservice_postgres_data:/var/lib/postgresql/data

  orderservice:
    build:
      context: .
    env_file:
      - .env
    container_name: orderservice-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ORDER_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${ORDER_SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      USERSERVICE_BASE_URL: ${USERSERVICE_BASE_URL:-http://host.docker.internal:8081}
    ports:
      - "8080:8080"

volumes:
  orderservice_postgres_data:
